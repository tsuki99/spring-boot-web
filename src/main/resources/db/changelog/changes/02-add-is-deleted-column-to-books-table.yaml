databaseChangeLog:
  - changeSet:
      id: add-is-deleted-column-to-books-table
      author: tsuki99
      changes:
        - addColumn:
            tableName: books
            columns:
              - column:
                  name: is_deleted
                  type: TINYINT(1)
                  defaultValueBoolean: false
                  constraints:
                    nullable: false