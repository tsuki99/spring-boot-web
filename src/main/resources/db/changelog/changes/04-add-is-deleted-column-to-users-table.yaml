databaseChangeLog:
  - changeSet:
      id: add-is-deleted-column-to-users-table
      author: tsuki99
      changes:
        - addColumn:
            tableName: users
            columns:
              - column:
                  name: is_deleted
                  type: TINYINT(1)
                  defaultValueBoolean: false
                  constraints:
                    nullable: false
                    where: is_deleted IS NULL